<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Décodeur de Pensées — Transformez votre braindump vocal en tâches structurées grâce à Mistral AI.">
    <title>🧠 Décodeur de Pensées</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-glow"></div>

    <main class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🧠</span>
                <h1>Décodeur de Pensées</h1>
            </div>
            <p class="subtitle">Enregistrez votre braindump vocal, l'IA extrait vos tâches.</p>
        </header>

        <!-- Navigation / Sub-features -->
        <div class="nav-cards" style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem;">
            <a href="/interview" style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.5rem; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 0.8rem; transition: var(--transition);">
                <span style="font-size: 1.5rem;">💬</span>
                <div>
                    <h3 style="font-size: 0.95rem; margin-bottom: 0.2rem;">Coach Entretien</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Entraînez-vous avec un recruteur IA</p>
                </div>
            </a>
            <a href="/coverletter" style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.5rem; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 0.8rem; transition: var(--transition);">
                <span style="font-size: 1.5rem;">✍️</span>
                <div>
                    <h3 style="font-size: 0.95rem; margin-bottom: 0.2rem;">Lettre de Motivation</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Laissez l'IA rédiger une lettre à votre image</p>
                </div>
            </a>
        </div>

        <!-- Recorder Section -->
        <section class="recorder-section" id="recorder-section">
            <button class="record-btn" id="record-btn" aria-label="Enregistrer">
                <span class="record-btn-inner">
                    <svg class="mic-icon" id="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span class="stop-icon" id="stop-icon">■</span>
                </span>
                <span class="pulse-ring" id="pulse-ring"></span>
            </button>
            <p class="record-label" id="record-label">Cliquez pour enregistrer</p>
            <div class="timer" id="timer">00:00</div>
        </section>

        <!-- Status / Loading -->
        <section class="status-section" id="status-section" hidden>
            <div class="loader-container">
                <div class="loader"></div>
                <p class="status-text" id="status-text">Envoi de l'audio…</p>
            </div>
        </section>

        <!-- Error -->
        <section class="error-section" id="error-section" hidden>
            <div class="error-card">
                <span class="error-icon">⚠️</span>
                <p class="error-text" id="error-text"></p>
                <button class="btn-retry" id="btn-retry">Réessayer</button>
            </div>
        </section>

        <!-- Results -->
        <section class="results-section" id="results-section" hidden>
            <div class="transcript-card" id="transcript-card">
                <h2>📝 Transcription</h2>
                <p class="transcript-text" id="transcript-text"></p>
            </div>

            <h2 class="tasks-title" id="tasks-title"></h2>
            <div class="tasks-grid" id="tasks-grid"></div>

            <button class="btn-new" id="btn-new">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                Nouveau braindump
            </button>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
